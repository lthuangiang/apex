<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DRIFT — Let it run.</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;background:#080c14;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#0d1117;border:1px solid #1a2030;border-radius:16px;padding:2.5rem 2.5rem 2rem;width:100%;max-width:360px;text-align:center}
    .logo-wrap{margin-bottom:1.5rem}
    .logo-wrap img{width:180px;height:auto}
    .tagline{font-size:0.72rem;color:#4a9eff;letter-spacing:0.12em;text-transform:lowercase;margin-top:-0.25rem;margin-bottom:1.75rem}
    .divider{border:none;border-top:1px solid #1a2030;margin-bottom:1.5rem}
    label{font-size:0.7rem;color:#555;text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:0.4rem;text-align:left}
    input{width:100%;background:#080c14;border:1px solid #1e2a3a;border-radius:8px;padding:0.65rem 0.85rem;color:#e0e0e0;font-size:0.9rem;outline:none;transition:border-color 0.2s}
    input:focus{border-color:#4a9eff}
    button{width:100%;margin-top:1rem;background:linear-gradient(135deg,#4a9eff,#7b5ea7);color:#fff;border:none;border-radius:8px;padding:0.72rem;font-size:0.9rem;font-weight:600;cursor:pointer;letter-spacing:0.04em;transition:opacity 0.2s}
    button:hover{opacity:0.88}
    .error{color:#ff4d4d;font-size:0.75rem;margin-top:0.75rem;display:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/images/logo.png" alt="DRIFT"/>
    </div>
    <p class="tagline">let it run.</p>
    <hr class="divider"/>
    <label for="pc">Passcode</label>
    <input type="password" id="pc" placeholder="••••••••" autofocus/>
    <button onclick="login()">Unlock</button>
    <p class="error" id="err">Incorrect passcode.</p>
  </div>
  <script>
    document.getElementById('pc').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
    async function login() {
      const p = document.getElementById('pc').value;
      const err = document.getElementById('err');
      err.style.display = 'none';
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ passcode: p })
        });
        if (r.ok) { window.location.href = '/'; }
        else { err.style.display = 'block'; document.getElementById('pc').value = ''; }
      } catch { err.style.display = 'block'; }
    }
  </script>
</body>
</html>
