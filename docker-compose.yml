version: '3.8'

services:
  # ── APEX Trading Bot ─────────────────────────────────────────────────────
  # Runs standalone without Ollama/ChromaDB for low-memory VPS (1G RAM)
  # Trading Memory AI is disabled — uses cloud LLM (OpenAI/Anthropic) only
  apex:
    image: ghandicap/apex:1.0.1
    container_name: apex
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      - CHROMA_URL=
      - OLLAMA_URL=
      - TELEGRAM_ENABLED=true
      - STATE_STORE_PATH=/app/data/bot_state.json
      - TRADE_LOG_PATH=/app/data/trades.json
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/pnl"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
